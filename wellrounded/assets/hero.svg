<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4eedf"/>
      <stop offset="100%" stop-color="#eaf4f9"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8d9c5"/>
      <stop offset="100%" stop-color="#8cb89e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#fde8a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fffbe8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="560" height="500" fill="url(#sky)" rx="18"/>

  <!-- Sun glow -->
  <circle cx="280" cy="145" r="120" fill="url(#glow)" filter="url(#blur8)"/>
  <circle cx="280" cy="145" r="52" fill="#fef3c0" opacity="0.65" filter="url(#blur2)"/>
  <circle cx="280" cy="145" r="32" fill="url(#sun)" opacity="0.9"/>

  <!-- Light rays -->
  <g opacity="0.13" stroke="#f9e070" stroke-width="1.5">
    <line x1="280" y1="113" x2="280" y2="18"/>
    <line x1="280" y1="113" x2="355" y2="38"/>
    <line x1="280" y1="113" x2="408" y2="82"/>
    <line x1="280" y1="113" x2="205" y2="38"/>
    <line x1="280" y1="113" x2="152" y2="82"/>
    <line x1="280" y1="113" x2="440" y2="138"/>
    <line x1="280" y1="113" x2="120" y2="138"/>
  </g>

  <!-- Clouds -->
  <g opacity="0.55" filter="url(#blur2)">
    <ellipse cx="108" cy="105" rx="58" ry="22" fill="white"/>
    <ellipse cx="78" cy="112" rx="32" ry="18" fill="white"/>
    <ellipse cx="140" cy="114" rx="30" ry="17" fill="white"/>
  </g>
  <g opacity="0.4" filter="url(#blur2)">
    <ellipse cx="440" cy="95" rx="52" ry="19" fill="white"/>
    <ellipse cx="415" cy="102" rx="28" ry="16" fill="white"/>
    <ellipse cx="466" cy="103" rx="26" ry="15" fill="white"/>
  </g>

  <!-- Far hills -->
  <ellipse cx="90" cy="380" rx="210" ry="85" fill="#c6dfd0" opacity="0.55"/>
  <ellipse cx="470" cy="370" rx="190" ry="75" fill="#c6dfd0" opacity="0.5"/>

  <!-- Near ground -->
  <path d="M0 415 Q110 345 220 380 Q310 415 420 355 Q490 318 560 365 L560 500 L0 500 Z" fill="url(#ground)"/>

  <!-- Winding path -->
  <path d="M242 500 Q252 448 262 408 Q270 375 274 340 Q278 308 275 272" stroke="white" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.22"/>
  <path d="M242 500 Q252 448 262 408 Q270 375 274 340 Q278 308 275 272" stroke="#e8f5ec" stroke-width="11" stroke-linecap="round" stroke-dasharray="2 20" fill="none" opacity="0.5"/>

  <!-- Left trees -->
  <rect x="76" y="312" width="11" height="68" rx="4" fill="#5e8a6e"/>
  <ellipse cx="82" cy="312" rx="34" ry="25" fill="#8cb89e"/>
  <ellipse cx="82" cy="292" rx="27" ry="22" fill="#72a886"/>
  <ellipse cx="82" cy="274" rx="19" ry="17" fill="#5e9a72"/>

  <rect x="130" y="300" width="13" height="78" rx="4" fill="#5e8a6e"/>
  <ellipse cx="137" cy="300" rx="40" ry="28" fill="#8cb89e"/>
  <ellipse cx="137" cy="276" rx="32" ry="24" fill="#72a886"/>
  <ellipse cx="137" cy="256" rx="22" ry="19" fill="#5e9a72"/>

  <rect x="46" y="330" width="9" height="54" rx="3" fill="#5e8a6e"/>
  <ellipse cx="51" cy="330" rx="26" ry="19" fill="#9ac7ac"/>
  <ellipse cx="51" cy="314" rx="20" ry="16" fill="#82b595"/>
  <ellipse cx="51" cy="301" rx="14" ry="13" fill="#6fa888"/>

  <!-- Right trees -->
  <rect x="408" y="305" width="13" height="72" rx="4" fill="#5e8a6e"/>
  <ellipse cx="415" cy="305" rx="40" ry="29" fill="#8cb89e"/>
  <ellipse cx="415" cy="280" rx="32" ry="24" fill="#72a886"/>
  <ellipse cx="415" cy="260" rx="22" ry="19" fill="#5e9a72"/>

  <rect x="460" y="318" width="11" height="60" rx="4" fill="#5e8a6e"/>
  <ellipse cx="466" cy="318" rx="32" ry="23" fill="#9ac7ac"/>
  <ellipse cx="466" cy="299" rx="25" ry="20" fill="#82b595"/>
  <ellipse cx="466" cy="283" rx="18" ry="15" fill="#6fa888"/>

  <rect x="486" y="332" width="9" height="46" rx="3" fill="#5e8a6e"/>
  <ellipse cx="491" cy="332" rx="23" ry="17" fill="#8cb89e"/>
  <ellipse cx="491" cy="319" rx="17" ry="14" fill="#72a886"/>

  <!-- Wildflowers -->
  <circle cx="195" cy="408" r="5" fill="#f9c6d0" opacity="0.9"/>
  <circle cx="208" cy="418" r="4" fill="#fde8a0" opacity="0.9"/>
  <circle cx="182" cy="420" r="3.5" fill="#c2dce8" opacity="0.9"/>
  <circle cx="350" cy="400" r="5" fill="#fde8a0" opacity="0.9"/>
  <circle cx="364" cy="412" r="4" fill="#f9c6d0" opacity="0.9"/>
  <circle cx="338" cy="414" r="3.5" fill="#c6dfd0" opacity="0.9"/>
  <circle cx="222" cy="425" r="3" fill="#fde8a0" opacity="0.8"/>
  <circle cx="328" cy="422" r="3" fill="#f9c6d0" opacity="0.8"/>
  <circle cx="170" cy="432" r="2.5" fill="#fde8a0" opacity="0.7"/>
  <circle cx="380" cy="426" r="2.5" fill="#c2dce8" opacity="0.7"/>

  <!-- Butterfly -->
  <g transform="translate(308,242) rotate(-12)">
    <ellipse cx="-9" cy="-4" rx="11" ry="7" fill="#c2dce8" opacity="0.85"/>
    <ellipse cx="9" cy="-4" rx="11" ry="7" fill="#c2dce8" opacity="0.85"/>
    <ellipse cx="-6" cy="4" rx="7" ry="5" fill="#eaf4f9" opacity="0.75"/>
    <ellipse cx="6" cy="4" rx="7" ry="5" fill="#eaf4f9" opacity="0.75"/>
    <line x1="0" y1="-9" x2="0" y2="7" stroke="#7fb3c8" stroke-width="1.3"/>
  </g>

  <!-- Birds -->
  <g stroke="#8cb89e" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M165 84 Q168 81 171 84"/>
    <path d="M178 76 Q181 73 184 76"/>
    <path d="M390 94 Q393 91 396 94"/>
    <path d="M404 86 Q407 83 410 86"/>
    <path d="M182 102 Q185 99 188 102"/>
  </g>
</svg>
